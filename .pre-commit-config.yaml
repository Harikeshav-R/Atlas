repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: typecheck
        name: typecheck
        entry: pnpm typecheck
        language: system
        pass_filenames: false
        always_run: true
      - id: lint
        name: lint
        entry: pnpm lint
        language: system
        pass_filenames: false
        always_run: true
      - id: test
        name: test
        entry: pnpm test
        language: system
        pass_filenames: false
        always_run: true
